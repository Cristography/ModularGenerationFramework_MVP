openapi: 3.0.3

info:
  title: MGF — Modular Generation Framework API
  description: |
    REST API for the MGF platform. All endpoints are prefixed with `/v1`.

    ## Authentication
    All protected routes require a Bearer token obtained from `POST /auth/login`.
    Pass it as: `Authorization: Bearer <token>`

    ## AI Generation
    Users bring their own API keys (stored via `/me/ai-providers`).
    Generation calls proxy through MGF backend — keys are never exposed client-side.

    ## Pagination
    List endpoints support `?page=1&per_page=20`. Response includes a `meta` pagination object.

    ## Error Format
    All errors return `{ "message": "...", "errors": { "field": ["..."] } }` (422)
    or `{ "message": "..." }` for other status codes.
  version: 1.0.0
  contact:
    name: MGF Team

servers:
  - url: https://api.mgf.dev/v1
    description: Production
  - url: http://localhost:8000/api/v1
    description: Local development

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────────────────────────────────────

security:
  - BearerAuth: []

# ─────────────────────────────────────────────────────────────────────────────
# TAGS (module grouping)
# ─────────────────────────────────────────────────────────────────────────────

tags:
  - name: Auth
    description: Registration, login, session management
  - name: Me
    description: Authenticated user — profile and AI provider config
  - name: Types
    description: Output type catalogue (presentation, poster, carousel…)
  - name: Templates
    description: Community templates — browse, create, fork or created from scratch
  - name: Projects
    description: User's personal projects (forks or created from scratch)
  - name: Files
    description: Modular file layers within a template or project
  - name: Generation
    description: AI generation jobs — full project or per-layer
  - name: Export
    description: Export a project to HTML / PDF / PNG / PPTX / ZIP / MD
  - name: Resources
    description: Community AI resource library (prompts, skills, agents, MCPs…)
  - name: Social
    description: Upvotes, comments, bookmarks — polymorphic across templates and resources

# ─────────────────────────────────────────────────────────────────────────────
# REUSABLE COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ── Parameters ─────────────────────────────────────────────────────────────

  parameters:
    PageParam:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    PerPageParam:
      name: per_page
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    TemplateId:
      name: template_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ProjectId:
      name: project_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    FileId:
      name: file_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ResourceId:
      name: resource_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    CommentId:
      name: comment_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ProviderId:
      name: provider_id
      in: path
      required: true
      schema: { type: string, format: uuid }

  # ── Schemas ─────────────────────────────────────────────────────────────────

  schemas:

    # ── Pagination ──────────────────────────────────────────────────────────

    PaginationMeta:
      type: object
      properties:
        current_page: { type: integer, example: 1 }
        per_page:     { type: integer, example: 20 }
        total:        { type: integer, example: 143 }
        last_page:    { type: integer, example: 8 }

    # ── Auth ────────────────────────────────────────────────────────────────

    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name:                  { type: string, example: "Alex Johnson" }
        email:                 { type: string, format: email }
        password:              { type: string, minLength: 8 }
        password_confirmation: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string }

    AuthResponse:
      type: object
      properties:
        token: { type: string, example: "1|abc123..." }
        user:  { $ref: '#/components/schemas/User' }

    # ── User ────────────────────────────────────────────────────────────────

    User:
      type: object
      properties:
        id:         { type: string, format: uuid }
        name:       { type: string }
        email:      { type: string, format: email }
        role:       { type: string, enum: [user, admin] }
        profile:    { $ref: '#/components/schemas/UserProfile' }
        created_at: { type: string, format: date-time }

    UserProfile:
      type: object
      properties:
        bio:        { type: string, nullable: true }
        avatar_url: { type: string, nullable: true }
        website:    { type: string, nullable: true }
        location:   { type: string, nullable: true }

    UpdateProfileRequest:
      type: object
      properties:
        name:       { type: string }
        bio:        { type: string, nullable: true }
        avatar_url: { type: string, nullable: true }
        website:    { type: string, nullable: true }
        location:   { type: string, nullable: true }

    # ── AI Provider ─────────────────────────────────────────────────────────

    AiProvider:
      type: object
      properties:
        id:            { type: string, format: uuid }
        provider:      { type: string, enum: [openai, anthropic, gemini, local, custom] }
        display_name:  { type: string, example: "My LM Studio" }
        base_url:      { type: string, example: "http://localhost:1234/v1" }
        default_model: { type: string, example: "gpt-4o" }
        has_key:       { type: boolean, description: "True if an API key is stored — key itself is never returned" }
        is_active:     { type: boolean }
        created_at:    { type: string, format: date-time }

    CreateAiProviderRequest:
      type: object
      required: [provider, base_url]
      properties:
        provider:      { type: string, enum: [openai, anthropic, gemini, local, custom] }
        display_name:  { type: string }
        api_key:       { type: string, description: "Encrypted server-side. Never returned in responses.", nullable: true }
        base_url:      { type: string, example: "https://api.openai.com/v1" }
        default_model: { type: string }

    UpdateAiProviderRequest:
      type: object
      properties:
        display_name:  { type: string }
        api_key:       { type: string, nullable: true, description: "Send to rotate the key" }
        base_url:      { type: string }
        default_model: { type: string }
        is_active:     { type: boolean }

    # ── Type ────────────────────────────────────────────────────────────────

    Type:
      type: object
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string, example: "presentation" }
        description: { type: string }
        icon:        { type: string, example: "slides" }

    # ── Template ────────────────────────────────────────────────────────────

    Template:
      type: object
      properties:
        id:            { type: string, format: uuid }
        user_id:       { type: string, format: uuid }
        author:        { $ref: '#/components/schemas/UserSummary' }
        type:          { $ref: '#/components/schemas/Type' }
        name:          { type: string }
        description:   { type: string, nullable: true }
        thumbnail_url: { type: string, nullable: true }
        visibility:    { type: string, enum: [public, private, unlisted] }
        tags:          { type: array, items: { type: string } }
        locale:        { type: string, example: "en" }
        direction:     { type: string, enum: [ltr, rtl] }
        fork_count:    { type: integer, description: "Derived — count of projects forked from this template" }
        upvote_count:  { type: integer }
        is_upvoted:    { type: boolean, description: "Authenticated user's upvote status" }
        is_bookmarked: { type: boolean }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    CreateTemplateRequest:
      type: object
      required: [type_id, name]
      properties:
        type_id:     { type: string, format: uuid }
        name:        { type: string, minLength: 1 }
        description: { type: string, nullable: true }
        visibility:  { type: string, enum: [public, private, unlisted], default: private }
        tags:        { type: array, items: { type: string } }
        locale:      { type: string, default: "en" }
        direction:   { type: string, enum: [ltr, rtl], default: ltr }

    UpdateTemplateRequest:
      type: object
      properties:
        name:          { type: string }
        description:   { type: string, nullable: true }
        thumbnail_url: { type: string, nullable: true }
        visibility:    { type: string, enum: [public, private, unlisted] }
        tags:          { type: array, items: { type: string } }

    # ── Project ─────────────────────────────────────────────────────────────

    Project:
      type: object
      properties:
        id:                   { type: string, format: uuid }
        user_id:              { type: string, format: uuid }
        template_id:          { type: string, format: uuid, nullable: true }
        type:                 { $ref: '#/components/schemas/Type' }
        origin_template_name: { type: string, nullable: true }
        name:                 { type: string }
        description:          { type: string, nullable: true }
        status:               { type: string, enum: [draft, published, archived] }
        visibility:           { type: string, enum: [public, private, unlisted] }
        tags:                 { type: array, items: { type: string } }
        locale:               { type: string }
        direction:            { type: string, enum: [ltr, rtl] }
        cloned_at:            { type: string, format: date-time, nullable: true }
        created_at:           { type: string, format: date-time }
        updated_at:           { type: string, format: date-time }

    CreateProjectRequest:
      type: object
      required: [type_id, name]
      properties:
        type_id:     { type: string, format: uuid }
        name:        { type: string }
        description: { type: string, nullable: true }
        visibility:  { type: string, enum: [public, private, unlisted], default: private }
        tags:        { type: array, items: { type: string } }
        locale:      { type: string, default: "en" }
        direction:   { type: string, enum: [ltr, rtl], default: ltr }

    UpdateProjectRequest:
      type: object
      properties:
        name:        { type: string }
        description: { type: string, nullable: true }
        status:      { type: string, enum: [draft, published, archived] }
        visibility:  { type: string, enum: [public, private, unlisted] }
        tags:        { type: array, items: { type: string } }

    ForkTemplateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, description: "Name for the newly created project" }

    # ── File ────────────────────────────────────────────────────────────────

    File:
      type: object
      properties:
        id:           { type: string, format: uuid }
        template_id:  { type: string, format: uuid, nullable: true }
        project_id:   { type: string, format: uuid, nullable: true }
        layer:        { type: string, enum: [slide, style, layout, content, context, rules, meta, asset] }
        name:         { type: string, example: "slide-01.html" }
        extension:    { type: string, example: "html" }
        sort_order:   { type: integer }
        content:      { type: string, nullable: true, description: "File body (DB-stored, <~100KB)" }
        storage_url:  { type: string, nullable: true, description: "Signed URL for S3-stored files" }
        size_bytes:   { type: integer, nullable: true }
        created_at:   { type: string, format: date-time }
        updated_at:   { type: string, format: date-time }

    CreateFileRequest:
      type: object
      required: [layer, name, extension]
      properties:
        layer:      { type: string, enum: [slide, style, layout, content, context, rules, meta, asset] }
        name:       { type: string, example: "slide-02.html" }
        extension:  { type: string, example: "html" }
        sort_order: { type: integer, default: 0 }
        content:    { type: string, nullable: true }

    UpdateFileRequest:
      type: object
      properties:
        name:       { type: string }
        content:    { type: string }
        sort_order: { type: integer }

    ReorderFilesRequest:
      type: object
      required: [order]
      properties:
        order:
          type: array
          description: "Array of file IDs in desired order"
          items: { type: string, format: uuid }

    # ── AI Generation ───────────────────────────────────────────────────────

    GenerateFullRequest:
      type: object
      required: [provider_id]
      properties:
        provider_id: { type: string, format: uuid, description: "Which user_ai_provider to use" }
        model:       { type: string, description: "Overrides provider default_model if set" }
        prompt:      { type: string, description: "Top-level generation prompt. Falls back to context.md if omitted." }

    GenerateLayerRequest:
      type: object
      required: [provider_id]
      properties:
        provider_id: { type: string, format: uuid }
        model:       { type: string }
        prompt:      { type: string, nullable: true, description: "Optional override — uses context.md + rules.md otherwise" }

    AiJob:
      type: object
      properties:
        id:           { type: string, format: uuid }
        project_id:   { type: string, format: uuid, nullable: true }
        template_id:  { type: string, format: uuid, nullable: true }
        file_id:      { type: string, format: uuid, nullable: true }
        provider:     { type: string }
        model:        { type: string }
        layer:        { type: string, nullable: true }
        status:       { type: string, enum: [pending, running, success, failed] }
        error_message: { type: string, nullable: true }
        tokens_used:  { type: integer, nullable: true }
        duration_ms:  { type: integer, nullable: true }
        created_at:   { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }

    # ── Export ──────────────────────────────────────────────────────────────

    ExportRequest:
      type: object
      required: [format]
      properties:
        format:
          type: string
          enum: [html, pdf, png, jpg, pptx, zip, md]
        options:
          type: object
          properties:
            page_size:  { type: string, enum: [A4, letter, custom], default: A4 }
            width_px:   { type: integer, description: "For custom page_size or PNG/JPG" }
            height_px:  { type: integer }
            quality:    { type: integer, minimum: 1, maximum: 100, default: 90, description: "For JPG" }
            slides:
              type: array
              description: "Export specific slide IDs only. Omit to export all."
              items: { type: string, format: uuid }

    ExportJob:
      type: object
      properties:
        id:           { type: string, format: uuid }
        project_id:   { type: string, format: uuid }
        format:       { type: string }
        status:       { type: string, enum: [pending, processing, ready, failed] }
        download_url: { type: string, nullable: true, description: "Signed URL — available when status=ready" }
        expires_at:   { type: string, format: date-time, nullable: true }
        created_at:   { type: string, format: date-time }

    # ── Resource ────────────────────────────────────────────────────────────

    Resource:
      type: object
      properties:
        id:              { type: string, format: uuid }
        user_id:         { type: string, format: uuid }
        author:          { $ref: '#/components/schemas/UserSummary' }
        forked_from_id:  { type: string, format: uuid, nullable: true }
        kind:            { type: string, enum: [prompt, skill, agent, rule, mcp, design_doc, hook] }
        name:            { type: string }
        description:     { type: string, nullable: true }
        content:         { type: string }
        placeholders:
          type: array
          nullable: true
          items:
            type: object
            properties:
              key:     { type: string }
              label:   { type: string }
              default: { type: string }
              type:    { type: string, enum: [text, textarea, select] }
        visibility:    { type: string, enum: [public, private, unlisted] }
        tags:          { type: array, items: { type: string } }
        upvote_count:  { type: integer }
        fork_count:    { type: integer }
        is_upvoted:    { type: boolean }
        is_bookmarked: { type: boolean }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    CreateResourceRequest:
      type: object
      required: [kind, name, content]
      properties:
        kind:         { type: string, enum: [prompt, skill, agent, rule, mcp, design_doc, hook] }
        name:         { type: string }
        description:  { type: string, nullable: true }
        content:      { type: string }
        placeholders: { type: array, items: { type: object } }
        visibility:   { type: string, enum: [public, private, unlisted], default: private }
        tags:         { type: array, items: { type: string } }

    UpdateResourceRequest:
      type: object
      properties:
        name:         { type: string }
        description:  { type: string, nullable: true }
        content:      { type: string }
        placeholders: { type: array, items: { type: object } }
        visibility:   { type: string, enum: [public, private, unlisted] }
        tags:         { type: array, items: { type: string } }

    ForkResourceRequest:
      type: object
      properties:
        name: { type: string, description: "Optional custom name for the fork. Defaults to 'Fork of <original name>'" }

    # ── Social ──────────────────────────────────────────────────────────────

    Comment:
      type: object
      properties:
        id:          { type: string, format: uuid }
        user_id:     { type: string, format: uuid }
        author:      { $ref: '#/components/schemas/UserSummary' }
        target_id:   { type: string, format: uuid }
        target_type: { type: string, enum: [template, resource] }
        parent_id:   { type: string, format: uuid, nullable: true }
        body:        { type: string }
        replies:
          type: array
          items: { $ref: '#/components/schemas/Comment' }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    CreateCommentRequest:
      type: object
      required: [body]
      properties:
        body:      { type: string, minLength: 1 }
        parent_id: { type: string, format: uuid, nullable: true, description: "Set to reply to an existing comment" }

    UpvoteResponse:
      type: object
      properties:
        upvoted:      { type: boolean }
        upvote_count: { type: integer }

    BookmarkResponse:
      type: object
      properties:
        bookmarked: { type: boolean }

    # ── Shared ──────────────────────────────────────────────────────────────

    UserSummary:
      type: object
      description: "Lightweight user object embedded in other resources"
      properties:
        id:         { type: string, format: uuid }
        name:       { type: string }
        avatar_url: { type: string, nullable: true }

    ErrorResponse:
      type: object
      properties:
        message: { type: string }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

  # ── Responses ───────────────────────────────────────────────────────────────

  responses:
    Unauthorized:
      description: Unauthenticated
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────

paths:

  # ════════════════════════════════════════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════════════════════════════════════════

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and get access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current token
      responses:
        '204': { description: Logged out }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/me:
    get:
      tags: [Auth]
      summary: Get authenticated user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ════════════════════════════════════════════════════════════════════════════
  # ME — Profile & AI Providers
  # ════════════════════════════════════════════════════════════════════════════

  /me/profile:
    put:
      tags: [Me]
      summary: Update own profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProfileRequest' }
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /me/ai-providers:
    get:
      tags: [Me]
      summary: List own AI provider connections
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/AiProvider' } }
        '401': { $ref: '#/components/responses/Unauthorized' }

    post:
      tags: [Me]
      summary: Add an AI provider connection
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAiProviderRequest' }
      responses:
        '201':
          description: Provider added
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiProvider' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /me/ai-providers/{provider_id}:
    parameters:
      - $ref: '#/components/parameters/ProviderId'

    put:
      tags: [Me]
      summary: Update an AI provider connection
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAiProviderRequest' }
      responses:
        '200':
          description: Provider updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiProvider' }
        '404': { $ref: '#/components/responses/NotFound' }

    delete:
      tags: [Me]
      summary: Remove an AI provider connection
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /me/ai-providers/{provider_id}/test:
    parameters:
      - $ref: '#/components/parameters/ProviderId'
    post:
      tags: [Me]
      summary: Test connectivity of an AI provider
      description: Sends a minimal ping to the provider's API to verify the key and base_url are valid.
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:      { type: boolean }
                  message: { type: string }
                  latency_ms: { type: integer }
        '404': { $ref: '#/components/responses/NotFound' }

  # ════════════════════════════════════════════════════════════════════════════
  # TYPES
  # ════════════════════════════════════════════════════════════════════════════

  /types:
    get:
      tags: [Types]
      summary: List all output types
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Type' } }

  # ════════════════════════════════════════════════════════════════════════════
  # TEMPLATES
  # ════════════════════════════════════════════════════════════════════════════

  /templates:
    get:
      tags: [Templates]
      summary: Browse public template gallery
      security: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: type_id
          in: query
          schema: { type: string, format: uuid }
        - name: tags
          in: query
          description: "Comma-separated tag list"
          schema: { type: string, example: "business,pitch" }
        - name: q
          in: query
          description: "Keyword search on name and description"
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string, enum: [popular, newest, most_forked], default: popular }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Template' } }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }

    post:
      tags: [Templates]
      summary: Create a new template
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTemplateRequest' }
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Template' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /templates/{template_id}:
    parameters:
      - $ref: '#/components/parameters/TemplateId'

    get:
      tags: [Templates]
      summary: Get template by ID
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Template' }
        '404': { $ref: '#/components/responses/NotFound' }

    put:
      tags: [Templates]
      summary: Update template (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTemplateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Template' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    delete:
      tags: [Templates]
      summary: Soft-delete template (owner only)
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }

  /templates/{template_id}/fork:
    parameters:
      - $ref: '#/components/parameters/TemplateId'
    post:
      tags: [Templates]
      summary: Fork a public template into a new project
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForkTemplateRequest' }
      responses:
        '201':
          description: Project created from fork
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /templates/{template_id}/files:
    parameters:
      - $ref: '#/components/parameters/TemplateId'

    get:
      tags: [Templates]
      summary: List all files in a template
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/File' } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    post:
      tags: [Templates]
      summary: Add a file to a template (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateFileRequest' }
      responses:
        '201':
          description: File created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/File' }

  /templates/{template_id}/files/{file_id}:
    parameters:
      - $ref: '#/components/parameters/TemplateId'
      - $ref: '#/components/parameters/FileId'

    get:
      tags: [Templates]
      summary: Get a single template file
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/File' }

    put:
      tags: [Templates]
      summary: Update file content or metadata (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateFileRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/File' }

    delete:
      tags: [Templates]
      summary: Delete a template file (owner only)
      responses:
        '204': { description: Deleted }

