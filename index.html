<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forma — Modular Template Framework</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F5F1;--sur:#FFFFFF;--sur2:#F0EEE9;--bor:#E3E1DB;--bor2:#C8C5BE;--t1:#131210;--t2:#5C5A54;--t3:#9C998F;--acc:#0A1628;--cy:#0ABFCD;--cy-d:rgba(10,191,205,.10);--cy-b:rgba(10,191,205,.28);--r4:4px;--r8:8px;--r12:12px;--r16:16px;--nav:56px;--fd:'Syne',sans-serif;--fb:'Outfit',sans-serif;--fm:'JetBrains Mono',monospace}
.dark{--bg:#0E0E0C;--sur:#161614;--sur2:#1C1C1A;--bor:#282825;--bor2:#3A3A36;--t1:#F0EEE8;--t2:#9C998F;--t3:#5C5A54;--acc:#E8E6E0}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);line-height:1.6;transition:background .2s,color .2s;min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:var(--fb);border:none;background:none}
input,textarea,select{font-family:var(--fb)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bor2);border-radius:10px}

/* NAV */
#nav{height:var(--nav);background:var(--sur);border-bottom:1px solid var(--bor);display:flex;align-items:center;padding:0 20px;gap:28px;position:sticky;top:0;z-index:100;transition:background .2s,border-color .2s}
.n-logo{font-family:var(--fd);font-size:17px;font-weight:800;letter-spacing:-.035em;display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.logo-mark{width:28px;height:28px;background:var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.dark .logo-mark{background:var(--cy)}
.n-links{display:flex;gap:2px;flex:1}
.n-link{font-size:13px;font-weight:500;color:var(--t2);padding:6px 11px;border-radius:var(--r8);transition:all .15s;cursor:pointer}
.n-link:hover,.n-link.on{color:var(--t1);background:var(--sur2)}
.n-right{display:flex;align-items:center;gap:8px}
.btn-ai{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;color:var(--cy);border:1px solid var(--cy-b);background:var(--cy-d);padding:6px 13px;border-radius:var(--r8);transition:all .15s;cursor:pointer}
.btn-ai:hover{background:rgba(10,191,205,.18);border-color:var(--cy)}
.ico-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--r8);color:var(--t2);border:1px solid var(--bor);background:var(--sur);transition:all .15s;cursor:pointer}
.ico-btn:hover{border-color:var(--bor2);color:var(--t1)}
.ava{width:30px;height:30px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;cursor:pointer;font-family:var(--fd);flex-shrink:0;transition:background .2s}
.dark .ava{background:var(--cy);color:#0A1628}

/* PAGE */
#page{min-height:calc(100vh - var(--nav))}
#page.editor-mode{height:calc(100vh - var(--nav));overflow:hidden;min-height:0}
.fade-in{animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;font-family:var(--fb);padding:8px 17px;border-radius:var(--r8);border:1px solid transparent;transition:all .15s;cursor:pointer;line-height:1}
.btn-p{background:var(--t1);color:var(--bg);border-color:var(--t1)}.btn-p:hover{opacity:.85}
.btn-s{background:var(--sur);color:var(--t1);border-color:var(--bor)}.btn-s:hover{border-color:var(--bor2);background:var(--sur2)}
.btn-cy{background:var(--cy);color:#061220;font-weight:600}.btn-cy:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--t2);border-color:transparent;padding:6px 11px}.btn-ghost:hover{color:var(--t1);background:var(--sur2)}
.btn-sm{font-size:12px;padding:6px 12px}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;font-family:var(--fd);padding:3px 8px;border-radius:20px;border:1px solid var(--bor);color:var(--t2);background:var(--sur);white-space:nowrap}
.badge-cy{border-color:var(--cy-b);color:var(--cy);background:var(--cy-d)}
.badge-dk{background:var(--acc);color:var(--bg);border-color:var(--acc)}
.tag{font-size:11px;font-weight:500;font-family:var(--fm);padding:2px 8px;border-radius:4px;background:var(--sur2);color:var(--t2);border:1px solid var(--bor)}

/* INPUTS */
.inp{width:100%;padding:8px 12px;background:var(--sur);border:1px solid var(--bor);border-radius:var(--r8);color:var(--t1);font-size:13.5px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--cy)}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical;min-height:80px;line-height:1.55}
.lbl{font-size:11.5px;font-weight:500;color:var(--t2);margin-bottom:5px;display:block;font-family:var(--fd);letter-spacing:.02em}

/* TEMPLATE CARD */
.t-card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r12);overflow:hidden;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.t-card:hover{border-color:var(--bor2);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.07)}
.dark .t-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.3)}
.card-prev{aspect-ratio:16/10;position:relative;overflow:hidden;background:var(--sur2)}
.card-ov{position:absolute;inset:0;opacity:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;transition:opacity .2s}
.t-card:hover .card-ov{opacity:1}
.card-body{padding:13px 15px}
.card-type{font-size:10.5px;font-weight:600;color:var(--t3);font-family:var(--fd);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.card-title{font-size:13.5px;font-weight:700;font-family:var(--fd);color:var(--t1);margin-bottom:8px;letter-spacing:-.01em}
.card-meta{display:flex;align-items:center;justify-content:space-between}
.card-author{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2)}
.a-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.card-up{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--t3);font-family:var(--fm)}

/* DIVIDERS */
.dvd{height:1px;background:var(--bor)}
.dvd-v{width:1px;background:var(--bor)}

/* AI DRAWER */
#ai-fab{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--acc);border:1.5px solid var(--cy-b);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:199;transition:all .2s;box-shadow:0 4px 20px rgba(10,191,205,.2)}
#ai-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(10,191,205,.35)}
.dark #ai-fab{background:var(--sur2)}
#ai-drawer{position:fixed;bottom:0;right:0;width:360px;height:500px;background:var(--sur);border:1px solid var(--bor);border-bottom:none;border-right:none;border-radius:var(--r16) 0 0 0;z-index:200;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);box-shadow:-6px -6px 32px rgba(0,0,0,.08)}
.dark #ai-drawer{box-shadow:-6px -6px 32px rgba(0,0,0,.35)}
#ai-drawer.open{transform:translateY(0)}
.ai-hd{padding:14px 18px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between}
.ai-hd-title{font-family:var(--fd);font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:7px;color:var(--t1)}
.ai-msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px}
.ai-m{font-size:13px;line-height:1.55}
.ai-m-ai{background:var(--sur2);border:1px solid var(--bor);border-radius:3px var(--r12) var(--r12) var(--r12);padding:10px 13px;color:var(--t1)}
.ai-m-u{background:var(--acc);color:var(--bg);border-radius:var(--r12) var(--r12) 3px var(--r12);padding:10px 13px;align-self:flex-end;max-width:85%}
.dark .ai-m-u{background:var(--cy);color:#061220}
.ai-inp-row{padding:10px 14px;border-top:1px solid var(--bor);display:flex;gap:8px;align-items:center}
.ai-inp-row .inp{border-radius:var(--r12);font-size:13px;padding:8px 13px}

/* MODAL */
#modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:300;opacity:0;pointer-events:none;transition:opacity .2s}
#modal-ov.open{opacity:1;pointer-events:all}
.modal{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r16);padding:28px;width:440px;transform:scale(.96) translateY(8px);transition:transform .2s}
#modal-ov.open .modal{transform:scale(1) translateY(0)}
.modal-title{font-family:var(--fd);font-size:17px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.modal-sub{font-size:13.5px;color:var(--t2);margin-bottom:20px;line-height:1.55}

/* ── LANDING ── */
.lhero{padding:80px 24px 56px;max-width:1200px;margin:0 auto}
.hero-ey{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;font-family:var(--fd);color:var(--cy);border:1px solid var(--cy-b);background:var(--cy-d);padding:5px 12px;border-radius:20px;margin-bottom:22px;letter-spacing:.05em;text-transform:uppercase}
.hero-h{font-family:var(--fd);font-size:clamp(38px,5.5vw,70px);font-weight:800;letter-spacing:-.04em;line-height:1.04;color:var(--t1);margin-bottom:22px;max-width:680px}
.hero-h em{font-style:italic;color:var(--t2)}
.hero-sub{font-size:16.5px;color:var(--t2);max-width:480px;margin-bottom:32px;line-height:1.65}
.hero-acts{display:flex;gap:11px;align-items:center;flex-wrap:wrap}
.hero-stats{display:flex;gap:28px;margin-top:44px;padding-top:28px;border-top:1px solid var(--bor)}
.h-stat strong{font-size:20px;font-weight:800;color:var(--t1);font-family:var(--fd);letter-spacing:-.03em;display:block}
.h-stat span{font-size:12px;color:var(--t3);font-family:var(--fd)}
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bor);border:1px solid var(--bor);border-radius:var(--r12);overflow:hidden;max-width:1200px;margin:0 24px}
.feat-item{background:var(--sur);padding:26px 22px}
.feat-icon{width:34px;height:34px;border-radius:var(--r8);border:1px solid var(--bor);background:var(--sur2);display:flex;align-items:center;justify-content:center;margin-bottom:13px;color:var(--t2)}
.feat-t{font-family:var(--fd);font-size:14px;font-weight:700;margin-bottom:6px}
.feat-d{font-size:13px;color:var(--t2);line-height:1.55}

/* ── MARKETPLACE ── */
.mkt-hd{padding:40px 24px 20px;max-width:1200px;margin:0 auto}
.mkt-title{font-family:var(--fd);font-size:30px;font-weight:800;letter-spacing:-.03em;margin-bottom:4px}
.fbar{display:flex;align-items:center;gap:8px;padding:0 24px 20px;max-width:1200px;margin:0 auto;flex-wrap:wrap}
.fchip{font-size:12.5px;font-weight:500;padding:5px 14px;border-radius:20px;border:1px solid var(--bor);color:var(--t2);background:var(--sur);cursor:pointer;transition:all .15s;font-family:var(--fd)}
.fchip:hover{border-color:var(--bor2);color:var(--t1)}
.fchip.on{background:var(--t1);color:var(--bg);border-color:var(--t1)}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px;padding:0 24px 56px;max-width:1200px;margin:0 auto}
.srch{position:relative;flex:1;max-width:300px}
.srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.srch .inp{padding-left:34px}

/* ── DETAIL ── */
.det-wrap{display:grid;grid-template-columns:1fr 320px;max-width:1200px;margin:0 auto;padding:0 24px;min-height:calc(100vh - var(--nav))}
.det-main{padding:36px 36px 36px 0;border-right:1px solid var(--bor)}
.det-side{padding:36px 0 36px 28px}
.det-prev{border-radius:var(--r12);border:1px solid var(--bor);overflow:hidden;margin-bottom:24px;aspect-ratio:16/10}
.det-title{font-family:var(--fd);font-size:26px;font-weight:800;letter-spacing:-.03em;margin-bottom:10px}
.det-meta{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.det-desc{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:22px}
.cmt-list{display:flex;flex-direction:column;gap:14px}
.cmt{display:flex;gap:10px}
.cmt-body{flex:1}
.cmt-author{font-size:12.5px;font-weight:600;font-family:var(--fd)}
.cmt-time{font-size:11px;color:var(--t3);margin-left:7px}
.cmt-text{font-size:13px;color:var(--t2);margin-top:3px;line-height:1.55}
.side-card{background:var(--sur2);border:1px solid var(--bor);border-radius:var(--r12);padding:18px;margin-bottom:14px}
.side-ct{font-family:var(--fd);font-size:11px;font-weight:700;margin-bottom:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
.frow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bor);font-size:12.5px}
.frow:last-child{border-bottom:none}
.fname{font-family:var(--fm);font-size:11.5px;color:var(--t1);flex:1}
.up-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--r8);border:1px solid var(--bor);background:var(--sur);cursor:pointer;font-size:13px;font-weight:500;font-family:var(--fd);color:var(--t2);transition:all .15s}
.up-btn:hover,.up-btn.voted{border-color:var(--cy-b);color:var(--cy);background:var(--cy-d)}

/* ── EDITOR ── */
.ed-wrap{display:grid;grid-template-columns:216px 1fr 262px;height:calc(100vh - var(--nav));overflow:hidden}
.ed-left{background:var(--sur);border-right:1px solid var(--bor);display:flex;flex-direction:column;overflow:hidden}
.ed-lhd{padding:10px;border-bottom:1px solid var(--bor);flex-shrink:0}
.slist{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px}
.sthumb{border-radius:var(--r8);border:2px solid var(--bor);overflow:hidden;cursor:pointer;position:relative;transition:all .15s}
.sthumb:hover{border-color:var(--bor2)}
.sthumb.on{border-color:var(--cy)}
.sthumb-in{aspect-ratio:16/10;position:relative;overflow:hidden}
.snum{position:absolute;bottom:3px;left:5px;font-size:9px;font-family:var(--fm);color:var(--t3)}
.ed-mid{background:var(--sur2);display:flex;flex-direction:column;overflow:hidden}
.ed-tb{height:42px;background:var(--sur);border-bottom:1px solid var(--bor);display:flex;align-items:center;padding:0 14px;gap:7px;flex-shrink:0}
.cv-area{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:28px}
.cv-frame{background:white;border-radius:var(--r8);box-shadow:0 4px 28px rgba(0,0,0,.10);width:100%;max-width:740px;aspect-ratio:16/10;position:relative;overflow:hidden;cursor:default}
.dark .cv-frame{box-shadow:0 4px 28px rgba(0,0,0,.45)}
.ed-right{background:var(--sur);border-left:1px solid var(--bor);display:flex;flex-direction:column;overflow:hidden}
.ed-rhd{padding:11px 15px;border-bottom:1px solid var(--bor);flex-shrink:0;font-family:var(--fd);font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.pscroll{flex:1;overflow-y:auto}
.psec{border-bottom:1px solid var(--bor)}
.psec-hd{padding:11px 15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:11.5px;font-weight:600;font-family:var(--fd);color:var(--t2);text-transform:uppercase;letter-spacing:.05em;user-select:none;transition:color .15s}
.psec-hd:hover{color:var(--t1)}
.psec-bd{padding:8px 15px 15px;display:flex;flex-direction:column;gap:9px}
.prop-row{display:flex;align-items:center;gap:9px}
.plbl{font-size:11.5px;color:var(--t2);min-width:66px;font-family:var(--fd)}
.swatch{width:26px;height:26px;border-radius:var(--r4);border:1px solid var(--bor);cursor:pointer;flex-shrink:0}
.pinp{flex:1;padding:5px 8px;background:var(--sur2);border:1px solid var(--bor);border-radius:var(--r4);color:var(--t1);font-size:12px;font-family:var(--fb);outline:none;transition:border-color .15s}
.pinp:focus{border-color:var(--cy)}
.abtns{display:flex;gap:2px}
.abtn{width:26px;height:26px;border-radius:var(--r4);border:1px solid var(--bor);background:var(--sur2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;color:var(--t2)}
.abtn.on,.abtn:hover{background:var(--t1);color:var(--bg);border-color:var(--t1)}
.rng{flex:1;accent-color:var(--cy);cursor:pointer}
select.pinp{cursor:pointer}

/* ── PROFILE ── */
.prof-hd{border-bottom:1px solid var(--bor);padding:36px 24px 0;max-width:1200px;margin:0 auto}
.prof-info{display:flex;gap:18px;align-items:flex-end;margin-bottom:24px}
.prof-ava{width:68px;height:68px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:22px;font-weight:800;color:white;flex-shrink:0;transition:background .2s}
.dark .prof-ava{background:var(--cy);color:#061220}
.prof-name{font-family:var(--fd);font-size:22px;font-weight:800;letter-spacing:-.02em}
.prof-handle{font-size:13.5px;color:var(--t2);margin-top:2px}
.prof-tabs{display:flex;gap:0}
.prof-tab{padding:9px 18px;font-size:13px;font-weight:500;font-family:var(--fd);color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.prof-tab:hover{color:var(--t1)}
.prof-tab.on{color:var(--t1);border-bottom-color:var(--t1)}
.prof-content{padding:28px 24px;max-width:1200px;margin:0 auto}

/* ── ADD TEMPLATE ── */
.add-wrap{max-width:700px;margin:0 auto;padding:56px 24px}
.add-title{font-family:var(--fd);font-size:28px;font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
.add-sub{font-size:14px;color:var(--t2);margin-bottom:36px;line-height:1.6}
.add-choices{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:36px}
.ch-card{background:var(--sur);border:2px solid var(--bor);border-radius:var(--r16);padding:28px 24px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:11px}
.ch-card:hover{transform:translateY(-2px)}
.ch-card.man:hover{border-color:var(--t1)}
.ch-card.ai:hover{border-color:var(--cy);background:var(--cy-d)}
.ch-icon{width:42px;height:42px;border-radius:var(--r12);background:var(--sur2);border:1px solid var(--bor);display:flex;align-items:center;justify-content:center}
.ch-title{font-family:var(--fd);font-size:16px;font-weight:700}
.ch-desc{font-size:13px;color:var(--t2);line-height:1.55}

/* ── AI GEN PAGE ── */
.aig-wrap{display:grid;grid-template-columns:1fr 380px;min-height:calc(100vh - var(--nav))}
.aig-main{padding:44px 44px 44px 44px;border-right:1px solid var(--bor)}
.aig-side{padding:44px 28px;background:var(--sur2)}
.aig-title{font-family:var(--fd);font-size:28px;font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
.aig-sub{font-size:14px;color:var(--t2);margin-bottom:32px;line-height:1.6}
.prompt-card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r12);padding:14px;margin-bottom:14px}
.prompt-card textarea.inp{border:none;background:transparent;padding:0;font-size:14px;line-height:1.65;min-height:96px;resize:none}
.prompt-card textarea.inp:focus{outline:none;box-shadow:none}
.g-opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--bor);border-radius:var(--r8);cursor:pointer;transition:all .15s;margin-bottom:8px}
.g-opt:hover{border-color:var(--cy-b);background:var(--cy-d)}
.g-opt.on{border-color:var(--cy);background:var(--cy-d)}
.g-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--bor2);transition:all .15s;flex-shrink:0}

            <span class="tag" style="background:${lb};border-color:${lc};color:${lc}">${f.ext}</span>
            <span class="tag" style="font-size:10.5px;border-color:transparent;color:var(--t3)">${f.layer}</span>
            <span class="fname">${f.name}</span>
          </div>`
        }).join('')}
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-s" onclick="setAddMode(null)">Cancel</button>
        <button class="btn btn-p">Publish template</button>
      </div>
    </div>
  </div>`
}

// ─── AI GENERATE ─────────────────────────────────────────────────────────────
function renderAIGen() {
  const steps = [
    {label:'Analysing your prompt',done:false},
    {label:'Generating structure layer (HTML)',done:false},
    {label:'Generating style layer (CSS)',done:false},
    {label:'Generating sample content (JSON + MD)',done:false},
    {label:'Saving template to your account',done:false},
  ]
  const typeOpts = ['Presentation','Website','Resume','Post','Carousel','Infographic']
  return `
  <div class="aig-wrap">
    <div class="aig-main">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px">
        <button class="btn btn-ghost btn-sm" onclick="go('add')" style="padding:6px 10px">←</button>
        <div>
          <h1 class="aig-title" style="margin:0">Generate with AI</h1>
          <p style="font-size:13.5px;color:var(--t2);margin-top:2px">Describe your template. AI generates all three layers.</p>
        </div>
      </div>

      <div class="prompt-card">
        <textarea class="inp" placeholder="Describe the template you want to create…&#10;&#10;e.g. A minimal dark presentation template for a tech startup fundraise. Include a title slide, team slide, traction slide, and financial summary. Use deep navy and cyan as accents." style="width:100%"></textarea>
        <div style="display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--bor);margin-top:10px">
          <span style="font-size:12px;color:var(--t3);font-family:var(--fm)">Powered by OpenRouter</span>
          <div style="display:flex;gap:8px">
            <select class="pinp" style="font-size:12px;height:30px;border-radius:var(--r8)">
              <option>claude-sonnet-4-5</option>
              <option>gpt-4o</option>
              <option>gemini-1.5-pro</option>
            </select>
          </div>
        </div>
      </div>

      <div style="margin-bottom:22px">
        <div class="lbl" style="margin-bottom:10px">Template type</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
          ${typeOpts.map(tp=>`
          <div class="g-opt ${S.genType===tp?'on':''}" onclick="setGenType('${tp}')">
            <div class="g-dot"></div>
            <span class="g-lbl">${tp}</span>
          </div>`).join('')}
        </div>
      </div>

      <div style="margin-bottom:22px">
        <div class="lbl" style="margin-bottom:10px">Layers to generate</div>
        ${[['structure','HTML layouts','Always generated'],['style','CSS theme','Always generated'],['content','sample_data.json + context.md','Always generated']].map(([l,d,note])=>`
        <div style="display:flex;align-items:center;gap:10px;padding:10px 13px;border:1px solid var(--cy-b);border-radius:var(--r8);margin-bottom:8px;background:var(--cy-d)">
          <div style="width:14px;height:14px;border-radius:50%;background:var(--cy);display:flex;align-items:center;justify-content:center;flex-shrink:0">${ic.check}</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:500;font-family:var(--fd)">${l}</div><div style="font-size:11.5px;color:var(--t2)">${d}</div></div>
          <span style="font-size:11px;color:var(--t3)">${note}</span>
        </div>`).join('')}
      </div>

      <div style="display:flex;gap:10px">
        <button class="btn btn-cy" style="padding:10px 22px">
          ${ic.spark}&nbsp; Generate template
        </button>
        <button class="btn btn-s">Save prompt as draft</button>
      </div>
    </div>

    <div class="aig-side">
      <div style="font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px">Generation log</div>
      <div class="aig-log">
        ${steps.map(s=>`
        <div class="aig-step ${s.done?'done':''}">
          <div class="step-dot">${ic.check}</div>
          <span style="font-size:12.5px;color:var(--t${s.done?'1':'2'})">${s.label}</span>
        </div>`).join('')}
      </div>
      <div style="margin-top:20px;padding:14px;background:var(--sur);border:1px solid var(--bor);border-radius:var(--r8)">
        <div style="font-size:12px;font-weight:600;font-family:var(--fd);color:var(--t2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">Previous generations</div>
        ${['Obsidian Deck','Dark Landing','Stats Carousel'].map((name,i)=>`
        <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bor);cursor:pointer" onclick="go('detail',{id:${i+1}})">
          <div style="width:32px;height:20px;border-radius:3px;background:${['#0D1F3C','#080808','#0A1628'][i]};flex-shrink:0"></div>
          <span style="font-size:12.5px;font-weight:500;flex:1">${name}</span>
          <span style="font-size:11px;color:var(--t3);font-family:var(--fm)">${['2d','1w','2w'][i]} ago</span>
        </div>`).join('')}
      </div>
    </div>
  </div>`
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(type, id) {
  const t = TMPL.find(x=>x.id===id) || TMPL[0]
  let html = ''
  if (type==='clone') {
    html = `
    <div class="modal-title">${ic.fork}&nbsp; Clone "${t.title}"</div>
    <div class="modal-sub">This creates a private project under your account. The structure and style layers are copied as-is. Fill in your real content after cloning.</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div>
        <label class="lbl">Project name</label>
        <input class="inp" value="My ${t.title}" id="clone-name">
      </div>
      <div>
        <label class="lbl">Locale</label>
        <select class="inp" style="height:40px">
          <option value="en">English (LTR)</option>
          <option value="ar">Arabic (RTL)</option>
          <option value="fr">French (LTR)</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-s" onclick="closeModal()">Cancel</button>
        <button class="btn btn-cy" onclick="doClone(${t.id})">${ic.fork}&nbsp; Clone &amp; open editor</button>
      </div>
    </div>`
  }
  document.getElementById('modal-cnt').innerHTML = html
  document.getElementById('modal-ov').classList.add('open')
}
function closeModal(e) {
  if (!e || e.target===document.getElementById('modal-ov'))
    document.getElementById('modal-ov').classList.remove('open')
}
function doClone(id) {
  closeModal()
  go('editor')
}

// ─── RENDER APP ──────────────────────────────────────────────────────────────
function render() {
  document.getElementById('nav').innerHTML = renderNav()
  const page = document.getElementById('page')
  let html = ''
  switch(S.route) {
    case 'landing':    html=renderLanding(); break
    case 'marketplace':html=renderMarketplace(); break
    case 'detail':     html=renderDetail(); break
    case 'editor':     html=renderEditor(); break
    case 'profile':    html=renderProfile(); break
    case 'add':        html=renderAdd(); break
    case 'ai-gen':     html=renderAIGen(); break
    default:           html=renderLanding()
  }
  page.className = S.route==='editor' ? 'editor-mode fade-in' : 'fade-in'
  page.innerHTML = html
  // show/hide AI fab
  document.getElementById('ai-fab').style.display = S.route==='editor' ? 'none' : 'flex'
  document.documentElement.className = S.dark ? 'dark' : ''
}

// ─── ACTIONS ────────────────────────────────────────────────────────────────
function go(route, extra={}) {
  S.route = route
  if (extra.id) S.detailId = extra.id
  S.layOpen = false
  window.scrollTo(0,0)
  render()
}
function toggleDark() { S.dark=!S.dark; render() }
function toggleAI() {
  S.aiOpen=!S.aiOpen
  document.getElementById('ai-drawer').classList.toggle('open',S.aiOpen)
}
function setFilter(f) { S.filter=f; render() }
function setProfTab(t) { S.profTab=t; render() }
function setSlide(i) { S.edSlide=i; render() }
function selectEl(el) { S.selEl=el; render() }
function toggleSec(sec) { S.secOpen[sec]=!S.secOpen[sec]; render() }
function toggleVote() { S.voted=!S.voted; render() }
function setAddMode(m) { S.addFormMode=m; render() }
function setGenType(t) { S.genType=t; render() }
function toggleLayPop() { S.layOpen=!S.layOpen; render() }
function addSlide(i) {
  SLIDES_DATA.push({...SLIDES_DATA[i],name:SLIDES_DATA[i].layout})
  S.edSlide=SLIDES_DATA.length-1
  S.layOpen=false
  render()
}
function aiSend(e) {
  if (e.key!=='Enter') return
  e.preventDefault()
  const inp = document.getElementById('ai-inp')
  const msg = inp.value.trim()
  if (!msg) return
  const msgs = document.getElementById('ai-msgs')
  msgs.innerHTML += `<div class="ai-m ai-m-u">${msg}</div>`
  inp.value = ''
  setTimeout(()=>{
    msgs.innerHTML += `<div class="ai-m ai-m-ai">Got it. I can help with that. Let me generate the content layer for your current slide — updating <code style="font-family:var(--fm);font-size:11px;background:var(--bor);padding:1px 5px;border-radius:3px">actual_data.json</code> now.</div>`
    msgs.scrollTop = msgs.scrollHeight
  }, 700)
  msgs.scrollTop = msgs.scrollHeight
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render()
</script>
</body>
</html>
