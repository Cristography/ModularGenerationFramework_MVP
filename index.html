<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MGF — Modular Generation Framework</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #e8e8e8;
      --sur: #f1f1f1;
      --sur2: #EFEDE8;
      --sur3: #E8E6E1;
      --bor: #43a7ff;
      --bor2: #C8C5BE;
      --t1: #111110;
      --t2: #5A5855;
      --t3: #9A9790;
      --acc: #0B1F3A;
      --cy: #09B8C4;
      --cy-d: rgba(9, 184, 196, .09);
      --cy-b: rgba(9, 184, 196, .28);
      --r4: 4px;
      --r8: 8px;
      --r12: 12px;
      --r16: 16px;
      --nav: 52px;
      --fn: 'Plus Jakarta Sans', sans-serif;
      --fm: 'JetBrains Mono', monospace
    }

    .dark {
      --bg: #212930;
      --sur: #141413;
      --sur2: #1A1A18;
      --sur3: #222220;
      --bor: #91deff;
      --bor2: #383835;
      --t1: #EDEAE4;
      --t2: #9A9790;
      --t3: #5A5855;
      --acc: #E8E5DF
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: var(--fn);
      background: var(--bg);
      color: var(--t1);
      line-height: 1.6;
      min-height: 100vh;
      transition: background .2s, color .2s
    }

    button {
      cursor: pointer;
      font-family: var(--fn);
      border: none;
      background: none
    }

    input,
    textarea,
    select {
      font-family: var(--fn)
    }

    ::-webkit-scrollbar {
      width: 3px;
      height: 3px
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bor2);
      border-radius: 10px
    }

    /* NAV */
    #nav {
      height: var(--nav);
      background: var(--sur);
      border-bottom: 1px solid var(--bor);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 6px;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background .2s, border-color .2s
    }

    .n-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      flex-shrink: 0;
      margin-right: 10px
    }

    .logo-mark {
      width: 26px;
      height: 26px;
      background: var(--acc);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      flex-shrink: 0
    }

    .dark .logo-mark {
      background: var(--cy)
    }

    .logo-txt {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--t1)
    }

    .logo-sub {
      font-size: 10px;
      font-weight: 500;
      color: var(--t3);
      letter-spacing: .01em;
      display: none
    }

    .n-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--t2);
      padding: 5px 10px;
      border-radius: var(--r8);
      transition: all .15s;
      cursor: pointer;
      white-space: nowrap
    }

    .n-link:hover,
    .n-link.on {
      color: var(--t1);
      background: var(--sur2)
    }

    .n-spacer {
      flex: 1
    }

    .ico-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--r8);
      color: var(--t2);
      border: 1px solid var(--bor);
      background: var(--sur);
      transition: all .15s;
      cursor: pointer;
      flex-shrink: 0
    }

    .ico-btn:hover {
      border-color: var(--bor2);
      color: var(--t1)
    }

    .ava {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--acc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s
    }

    .dark .ava {
      background: var(--cy);
      color: #061220
    }

    .n-sep {
      width: 1px;
      height: 18px;
      background: var(--bor);
      flex-shrink: 0;
      margin: 0 4px
    }

    /* PAGE */
    #page {
      min-height: calc(100vh - var(--nav))
    }

    #page.editor-mode {
      height: calc(100vh - var(--nav));
      overflow: hidden;
      min-height: 0
    }

    .fade {
      animation: fi .2s ease
    }

    @keyframes fi {
      from {
        opacity: 0;
        transform: translateY(4px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--fn);
      padding: 7px 15px;
      border-radius: var(--r8);
      border: 1px solid transparent;
      transition: all .15s;
      cursor: pointer;
      line-height: 1;
      white-space: nowrap
    }

    .btn-p {
      background: var(--t1);
      color: var(--bg);
      border-color: var(--t1)
    }

    .btn-p:hover {
      opacity: .85
    }

    .btn-s {
      background: var(--sur);
      color: var(--t1);
      border-color: var(--bor)
    }

    .btn-s:hover {
      border-color: var(--bor2)
    }

    .btn-cy {
      background: var(--cy);
      color: #041820;
      font-weight: 600
    }

    .btn-cy:hover {
      opacity: .9
    }

    .btn-ghost {
      background: transparent;
      color: var(--t2);
      border-color: transparent;
      padding: 5px 9px
    }

    .btn-ghost:hover {
      color: var(--t1);
      background: var(--sur2)
    }

    .btn-sm {
      font-size: 12px;
      padding: 5px 11px
    }

    .btn-xs {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: var(--r4)
    }

    /* INPUTS */
    .inp {
      width: 100%;
      padding: 7px 11px;
      background: var(--sur);
      border: 1px solid var(--bor);
      border-radius: var(--r8);
      color: var(--t1);
      font-size: 13px;
      outline: none;
      transition: border-color .15s
    }

    .inp:focus {
      border-color: var(--cy)
    }

    .inp::placeholder {
      color: var(--t3)
    }

    textarea.inp {
      resize: vertical;
      line-height: 1.55
    }

    .lbl {
      font-size: 11px;
      font-weight: 600;
      color: var(--t2);
      margin-bottom: 5px;
      display: block;
      letter-spacing: .03em;
      text-transform: uppercase
    }

    /* TAGS & BADGES */
    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--bor);
      color: var(--t2);
      background: var(--sur)
    }

    .badge-cy {
      border-color: var(--cy-b);
      color: var(--cy);
      background: var(--cy-d)
    }

    .badge-dk {
      background: var(--acc);
      color: var(--bg);
      border-color: var(--acc)
    }

    .dark .badge-dk {
      background: var(--sur3);
      color: var(--t1);
      border-color: var(--bor)
    }

    .tag {
      font-size: 11px;
      font-weight: 500;
      font-family: var(--fm);
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--sur2);
      color: var(--t2);
      border: 1px solid var(--bor)
    }

    /* CARD */
    .t-card {
      background: var(--sur);
      border: 1px solid var(--bor);
      border-radius: var(--r12);
      overflow: hidden;
      cursor: pointer;
      transition: all .18s;
      display: flex;
      flex-direction: column
    }

    .t-card:hover {
      border-color: var(--bor2);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, .06)
    }

    .dark .t-card:hover {
      box-shadow: 0 6px 24px rgba(0, 0, 0, .28)
    }

    .card-prev {
      aspect-ratio: 16/10;
      position: relative;
      overflow: hidden;
      background: var(--sur2)
    }

    .card-ov {
      position: absolute;
      inset: 0;
      opacity: 0;
      background: rgba(0, 0, 0, .22);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: opacity .18s
    }

    .t-card:hover .card-ov {
      opacity: 1
    }

    .card-body {
      padding: 12px 14px
    }

    .card-type {
      font-size: 10px;
      font-weight: 700;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 3px
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--t1);
      margin-bottom: 8px;
      letter-spacing: -.01em
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .card-author {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--t2)
    }

    .a-dot {
      width: 19px;
      height: 19px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      flex-shrink: 0
    }

    .card-up {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--t3);
      font-family: var(--fm)
    }

    /* DIVIDERS */
    .dvd {
      height: 1px;
      background: var(--bor)
    }

    .dvd-v {
      width: 1px;
      height: 16px;
      background: var(--bor)
    }

    /* AUTH PAGE */
    .auth-wrap {
      min-height: calc(100vh - var(--nav));
      display: flex
    }

    .auth-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px
    }

    .auth-right {
      width: 440px;
      background: var(--acc);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      flex-shrink: 0
    }

    .dark .auth-right {
      background: var(--sur2);
      border-left: 1px solid var(--bor)
    }

    .auth-box {
      width: 100%;
      max-width: 360px
    }

    .auth-brand {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--t1);
      margin-bottom: 4px
    }

    .auth-tagline {
      font-size: 12.5px;
      color: var(--t2);
      margin-bottom: 32px
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--bor)
    }

    .auth-tab {
      font-size: 13px;
      font-weight: 600;
      color: var(--t2);
      padding: 8px 16px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all .15s
    }

    .auth-tab.on {
      color: var(--t1);
      border-bottom-color: var(--t1)
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 14px
    }

    .auth-quote {
      color: rgba(255, 255, 255, .6);
      font-size: 13.5px;
      line-height: 1.7;
      font-style: italic;
      border-left: 2px solid var(--cy);
      padding-left: 14px
    }

    .auth-ql {
      font-size: 12px;
      color: rgba(255, 255, 255, .35);
      margin-top: 12px
    }

    .auth-feat {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 28px
    }

    .auth-f {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 12.5px;
      color: rgba(255, 255, 255, .5)
    }

    .auth-f-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--cy);
      flex-shrink: 0
    }

    /* MARKETPLACE */
    .mkt-hd {
      padding: 36px 22px 16px;
      max-width: 1180px;
      margin: 0 auto
    }

    .mkt-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.03em;
      margin-bottom: 2px
    }

    .fbar {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 22px 18px;
      max-width: 1180px;
      margin: 0 auto;
      flex-wrap: wrap
    }

    .fchip {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 13px;
      border-radius: 20px;
      border: 1px solid var(--bor);
      color: var(--t2);
      background: var(--sur);
      cursor: pointer;
      transition: all .15s
    }

    .fchip:hover {
      border-color: var(--bor2);
      color: var(--t1)
    }

    .fchip.on {
      background: var(--t1);
      color: var(--bg);
      border-color: var(--t1)
    }

    .tgrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
      gap: 12px;
      padding: 0 22px 52px;
      max-width: 1180px;
      margin: 0 auto
    }

    .srch {
      position: relative;
      flex: 1;
      max-width: 280px
    }

    .srch svg {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--t3);
      pointer-events: none
    }

    .srch .inp {
      padding-left: 32px;
      height: 34px;
      font-size: 13px
    }

    /* DETAIL */
    .det-wrap {
      display: grid;
      grid-template-columns: 1fr 300px;
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 22px;
      min-height: calc(100vh - var(--nav))
    }

    .det-main {
      padding: 32px 32px 32px 0;
      border-right: 1px solid var(--bor)
    }

    .det-side {
      padding: 32px 0 32px 24px
    }

    .det-prev {
      border-radius: var(--r12);
      border: 1px solid var(--bor);
      overflow: hidden;
      margin-bottom: 20px;
      aspect-ratio: 16/10
    }

    .det-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.025em;
      margin-bottom: 9px
    }

    .det-meta {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 15px
    }

    .det-desc {
      font-size: 13.5px;
      color: var(--t2);
      line-height: 1.7;
      margin-bottom: 20px
    }

    .cmt {
      display: flex;
      gap: 9px;
      margin-bottom: 14px
    }

    .cmt-author {
      font-size: 12px;
      font-weight: 700
    }

    .cmt-time {
      font-size: 11px;
      color: var(--t3);
      margin-left: 6px
    }

    .cmt-text {
      font-size: 13px;
      color: var(--t2);
      margin-top: 2px;
      line-height: 1.55
    }

    .side-card {
      background: var(--sur2);
      border: 1px solid var(--bor);
      border-radius: var(--r12);
      padding: 15px;
      margin-bottom: 12px
    }

    .side-ct {
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 9px;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: .07em
    }

    .up-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 13px;
      border-radius: var(--r8);
      border: 1px solid var(--bor);
      background: var(--sur);
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--t2);
      transition: all .15s
    }

    .up-btn:hover,
    .up-btn.voted {
      border-color: var(--cy-b);
      color: var(--cy);
      background: var(--cy-d)
    }

    .frow {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 0;
      border-bottom: 1px solid var(--bor);
      font-size: 12px
    }

    .frow:last-child {
      border-bottom: none
    }

    .fname {
      font-family: var(--fm);
      font-size: 11px;
      color: var(--t1);
      flex: 1
    }

    /* EDITOR */
    .ed-wrap {
      display: grid;
      grid-template-columns: 200px 1fr 270px;
      height: calc(100vh - var(--nav));
      overflow: hidden
    }

    .ed-left {
      background: var(--sur);
      border-right: 1px solid var(--bor);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .ed-lhd {
      padding: 8px;
      border-bottom: 1px solid var(--bor);
      flex-shrink: 0
    }

    .lay-vis {
      display: flex;
      gap: 4px;
      padding: 7px 8px;
      border-bottom: 1px solid var(--bor);
      flex-shrink: 0
    }

    .lv-btn {
      flex: 1;
      font-size: 10px;
      font-weight: 600;
      padding: 4px;
      border-radius: var(--r4);
      border: 1px solid var(--bor);
      background: var(--sur2);
      color: var(--t2);
      cursor: pointer;
      transition: all .15s;
      text-align: center;
      letter-spacing: .02em
    }

    .lv-btn.on {
      background: var(--t1);
      color: var(--bg);
      border-color: var(--t1)
    }

    .dark .lv-btn.on {
      background: var(--cy);
      color: #041820;
      border-color: var(--cy)
    }

    .slist {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .sthumb {
      border-radius: var(--r8);
      border: 2px solid var(--bor);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: all .15s
    }

    .sthumb:hover {
      border-color: var(--bor2)
    }

    .sthumb.on {
      border-color: var(--cy)
    }

    .sthumb-in {
      aspect-ratio: 16/10;
      overflow: hidden
    }

    .snum {
      position: absolute;
      bottom: 3px;
      left: 5px;
      font-size: 8.5px;
      font-family: var(--fm);
      color: var(--t3)
    }

    .lay-pop {
      position: absolute;
      left: 0;
      top: 100%;
      margin-top: 3px;
      background: var(--sur);
      border: 1px solid var(--bor);
      border-radius: var(--r8);
      padding: 5px;
      width: 100%;
      z-index: 50;
      box-shadow: 0 4px 18px rgba(0, 0, 0, .1);
      display: none
    }

    .lay-pop.open {
      display: block
    }

    .lay-item {
      padding: 6px 8px;
      border-radius: var(--r4);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .1s
    }

    .lay-item:hover {
      background: var(--sur2)
    }

    .lay-name {
      font-size: 11.5px;
      font-family: var(--fm);
      color: var(--t1)
    }

    .lay-thumb {
      width: 30px;
      height: 18px;
      border-radius: 2px;
      border: 1px solid var(--bor);
      overflow: hidden;
      flex-shrink: 0
    }

    /* EDITOR MIDDLE */
    .ed-mid {
      background: var(--sur2);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .ed-tb {
      height: 40px;
      background: var(--sur);
      border-bottom: 1px solid var(--bor);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 6px;
      flex-shrink: 0
    }

    .cv-area {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px
    }

    .cv-frame {
      background: white;
      border-radius: var(--r8);
      box-shadow: 0 4px 24px rgba(0, 0, 0, .09);
      width: 100%;
      max-width: 760px;
      aspect-ratio: 16/10;
      position: relative;
      overflow: hidden
    }

    .dark .cv-frame {
      box-shadow: 0 4px 24px rgba(0, 0, 0, .45)
    }

    .ed-status {
      height: 28px;
      background: var(--sur);
      border-top: 1px solid var(--bor);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 12px;
      flex-shrink: 0
    }

    /* EDITOR RIGHT */
    .ed-right {
      background: var(--sur);
      border-left: 1px solid var(--bor);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .ed-tabs {
      display: flex;
      border-bottom: 1px solid var(--bor);
      flex-shrink: 0
    }

    .ed-tab {
      flex: 1;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      padding: 9px 4px;
      color: var(--t2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all .15s;
      letter-spacing: .02em;
      text-transform: uppercase
    }

    .ed-tab:hover {
      color: var(--t1)
    }

    .ed-tab.on {

      <div style="margin-top:18px;padding:12px;background:var(--sur);border:1px solid var(--bor);border-radius:var(--r8)">
        <div style="font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px">Previous</div>
        ${['Obsidian Deck', 'Dark Landing', 'Stats Carousel'].map((name, i) => `<div style="display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--bor);cursor:pointer" onclick="go('detail',{id:${i + 1}})"><div style="width:28px;height:18px;border-radius:2px;background:${['#0D1F3C', '#080808', '#0A1628'][i]};flex-shrink:0"></div><span style="font-size:12px;font-weight:500;flex:1">${name}</span><span style="font-size:10.5px;color:var(--t3);font-family:var(--fm)">${['2d', '1w', '2w'][i]}</span></div>`).join('')}
      </div>
    </div>
  </div>`
    }

    // ── MODAL ─────────────────────────────────────────────────────────────────────
    function openModal(type, id) {
      const t = TMPL.find(x => x.id === id) || TMPL[0]
      let html = ''
      if (type === 'clone') html = `
    <div class="modal-title">${ic.fork} Clone "${t.title}"</div>
    <div class="modal-sub">Creates a private project under your account. Structure and style layers are copied as-is. Fill in your real content after cloning.</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label class="lbl">Project name</label><input class="inp" value="My ${t.title}"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label class="lbl">Locale</label><select class="inp" style="height:38px"><option>English (LTR)</option><option>Arabic (RTL)</option><option>French (LTR)</option></select></div>
        <div><label class="lbl">Direction</label><select class="inp" style="height:38px"><option>ltr</option><option>rtl</option></select></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
        <button class="btn btn-s" onclick="closeModal()">Cancel</button>
        <button class="btn btn-cy" onclick="doClone()">${ic.fork} Clone &amp; open</button>
      </div>
    </div>`
      document.getElementById('modal-cnt').innerHTML = html
      document.getElementById('modal-ov').classList.add('open')
    }
    function closeModal(e) { if (!e || e.target === document.getElementById('modal-ov')) document.getElementById('modal-ov').classList.remove('open') }
    function doClone() { closeModal(); go('editor') }

    // ── RENDER ────────────────────────────────────────────────────────────────────
    function render() {
      document.getElementById('nav').innerHTML = renderNav()
      const page = document.getElementById('page')
      let html = ''
      if (!S.loggedIn) { html = renderAuth() }
      else switch (S.route) {
        case 'landing': html = renderLanding(); break
        case 'marketplace': html = renderMarketplace(); break
        case 'detail': html = renderDetail(); break
        case 'editor': html = renderEditor(); break
        case 'profile': html = renderProfile(); break
        case 'add': html = renderAdd(); break
        case 'ai-gen': html = renderAIGen(); break
        default: html = renderLanding()
      }
      page.className = (!S.loggedIn || S.route === 'editor') ? 'editor-mode fade' : 'fade'
      if (!S.loggedIn) page.className = 'fade'
      page.innerHTML = html
      document.documentElement.className = S.dark ? 'dark' : ''
    }

    // ── ACTIONS ───────────────────────────────────────────────────────────────────
    function go(route, extra = {}) { S.route = route; if (extra.id) S.detailId = extra.id; S.layOpen = false; window.scrollTo(0, 0); render() }
    function toggleDark() { S.dark = !S.dark; render() }
    function setFilter(f) { S.filter = f; render() }
    function setProfTab(t) { S.profTab = t; render() }
    function setSlide(i) { S.edSlide = i; render() }
    function selectEl(el) { S.selEl = el; render() }
    function toggleSec(sec) { S.secOpen[sec] = !S.secOpen[sec]; render() }
    function toggleVote() { S.voted = !S.voted; render() }
    function setAddMode(m) { S.addFormMode = m; render() }
    function setGenType(t) { S.genType = t; render() }
    function toggleLayPop() { S.layOpen = !S.layOpen; render() }
    function setEdTab(t) { S.edTab = t; render() }
    function setAuthTab(t) { S.authTab = t; render() }
    function toggleLayVis(k) { S.layVis[k] = !S.layVis[k]; render() }
    function addSlide(i) { SLIDES.push({ ...SLIDES[i] }); S.edSlide = SLIDES.length - 1; S.layOpen = false; render() }
    function doLogin() { S.loggedIn = true; S.route = 'landing'; render() }
    function doLogout() { S.loggedIn = false; S.route = 'auth'; render() }

    render()
  </script>
</body>

</html>
