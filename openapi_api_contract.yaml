  # ════════════════════════════════════════════════════════════════════════════
  # AI GENERATION
  # ════════════════════════════════════════════════════════════════════════════

  /projects/{project_id}/generate:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [Generation]
      summary: Generate all layers of a project with AI
      description: |
        Reads `context.md` and `rules.md` from the project files, calls the AI provider,
        and regenerates all layers (content, slides, style). Creates an `ai_job` record.
        Generation runs asynchronously — poll `/projects/{id}/jobs` or wait for the returned job status.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateFullRequest' }
      responses:
        '202':
          description: Generation job accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiJob' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /projects/{project_id}/files/{file_id}/generate:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/FileId'
    post:
      tags: [Generation]
      summary: Regenerate a single file/layer with AI
      description: |
        Targets only the specified file. Uses the project's `context.md` and `rules.md`
        as context unless `prompt` is explicitly provided in the request body.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateLayerRequest' }
      responses:
        '202':
          description: Generation job accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiJob' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /projects/{project_id}/jobs:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Generation]
      summary: List AI generation job history for a project
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/AiJob' } }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }

  /jobs/{job_id}:
    parameters:
      - name: job_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Generation]
      summary: Poll a specific AI job by ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiJob' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ════════════════════════════════════════════════════════════════════════════
  # EXPORT
  # ════════════════════════════════════════════════════════════════════════════

  /projects/{project_id}/export:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [Export]
      summary: Request an export of a project
      description: |
        Queues an export job. Poll the returned `ExportJob` until `status=ready`,
        then download via `download_url` (signed URL, expires in 1 hour).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExportRequest' }
      responses:
        '202':
          description: Export job queued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExportJob' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /export-jobs/{job_id}:
    parameters:
      - name: job_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Export]
      summary: Poll export job status
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExportJob' }
        '404': { $ref: '#/components/responses/NotFound' }

